version: 2

multi-ecosystem-groups:
  shakapacker:
    schedule:
      interval: weekly

updates:
- package-ecosystem: bundler
  directory: "/"
  schedule:
    interval: daily
    time: "19:00"
  open-pull-requests-limit: 10
  versioning-strategy: increase-if-necessary
  cooldown:
    default-days: 5

- package-ecosystem: bundler
  directory: "/"
  schedule:
    interval: daily
    time: "19:00"
  patterns: ["shakapacker"]
  multi-ecosystem-group: shakapacker
  cooldown:
    default-days: 5

- package-ecosystem: npm
  directory: "/"
  schedule:
    interval: daily
    time: "19:00"
  open-pull-requests-limit: 10
  cooldown:
    default-days: 5

- package-ecosystem: npm
  directory: "/"
  schedule:
    interval: daily
    time: "19:00"
  patterns: ["shakapacker"]
  multi-ecosystem-group: shakapacker
  cooldown:
    default-days: 5
